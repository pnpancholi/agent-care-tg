name: Deployment

on:
  push:
    branches: 
    - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Build Docker image
        run: docker build -t agent-care-bot .

      - name: Save Docker image
        run: docker save agent-care-bot | gzip > agent-care-bot.tar.gz

      - name: Copy image to VM
        run: |
          gcloud compute scp agent-care-bot.tar.gz ${{ secrets.GCP_VM_NAME }}:~ \
            --zone ${{ secrets.GCP_VM_ZONE }}
      
      - name: Create .env file
        run: |
          cat <<EOF > .env
          TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          EOF
          chmod 600 .env

      - name: Copy .env file to VM
        run: |
          gcloud compute scp .env ${{ secrets.GCP_VM_NAME }}:~ \
            --zone ${{ secrets.GCP_VM_ZONE }}

      - name: Copy deploy script to VM
        run: |
          gcloud compute scp .github/workflows/deploy.sh ${{ secrets.GCP_VM_NAME }}:~ \
          --zone ${{ secrets.GCP_VM_ZONE }}

      - name: Deploy on VM
        run: |
          gcloud compute ssh ${{ secrets.GCP_VM_NAME }} \
          --zone ${{ secrets.GCP_VM_ZONE }} \
          --command  "bash ~/deploy.sh"     
